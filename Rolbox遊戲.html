<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小二數學大冒險</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            touch-action: none; /* 防止手機瀏覽器滑動特效 */
            font-family: 'Comic Sans MS', 'Microsoft JhengHei', sans-serif;
            background-color: #87CEEB;
        }
        #game-canvas {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        /* 十字準心 */
        .crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            pointer-events: none;
            z-index: 10;
        }
        .crosshair::before, .crosshair::after {
            content: '';
            position: absolute;
            background: white;
            box-shadow: 0 0 2px rgba(0,0,0,0.5);
        }
        .crosshair::before {
            top: 9px; left: 0; width: 20px; height: 2px;
        }
        .crosshair::after {
            top: 0; left: 9px; width: 2px; height: 20px;
        }
        /* 手機虛擬搖桿視覺 */
        #joystick-base {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            pointer-events: none;
            display: none;
            z-index: 20;
        }
        #joystick-stick {
            position: absolute;
            top: 25px;
            left: 25px;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <!-- 3D 畫布 -->
    <canvas id="game-canvas"></canvas>

    <!-- UI 覆蓋層 -->
    <div id="ui-layer" class="absolute inset-0 pointer-events-none">
        
        <!-- 十字準心 -->
        <div id="crosshair" class="crosshair"></div>

        <!-- 狀態列 (HUD) -->
        <div class="absolute top-4 left-4 bg-white/90 p-3 rounded-xl shadow-lg border-4 border-gray-800 pointer-events-auto flex flex-col items-start">
            <div class="flex items-center">
                <!-- R幣 SVG 圖示 -->
                <svg viewBox="0 0 40 40" class="w-8 h-8 mr-2 drop-shadow-sm" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- 外框 -->
                    <path d="M20 3 L4 12.2 V 27.8 L20 37 L36 27.8 V 12.2 Z" stroke="#232527" stroke-width="3.5" stroke-linejoin="round"/>
                    <!-- 內層實心 -->
                    <path d="M20 9 L9.5 15 V 25 L20 31 L30.5 25 V 15 Z" fill="#232527"/>
                    <!-- 中間挖空 -->
                    <rect x="15.5" y="15.5" width="9" height="9" fill="white" rx="1"/>
                </svg>
                <h1 class="text-3xl font-black text-gray-800 tracking-wider">
                    <span id="score-display">0</span><span class="text-xl text-gray-500 ml-1">/ 1000</span>
                </h1>
            </div>
            <p class="text-sm text-gray-600 font-bold mt-1 mb-1">收集七彩方塊拿大寶石！</p>
            
            <!-- 彩虹收集條 -->
            <div class="flex items-center gap-1.5 mt-1" id="rainbow-hud">
                <div id="hud-red" class="w-5 h-5 rounded bg-red-500 opacity-20 transition-all duration-300 border-2 border-gray-800"></div>
                <div id="hud-orange" class="w-5 h-5 rounded bg-orange-500 opacity-20 transition-all duration-300 border-2 border-gray-800"></div>
                <div id="hud-yellow" class="w-5 h-5 rounded bg-yellow-400 opacity-20 transition-all duration-300 border-2 border-gray-800"></div>
                <div id="hud-green" class="w-5 h-5 rounded bg-green-500 opacity-20 transition-all duration-300 border-2 border-gray-800"></div>
                <div id="hud-blue" class="w-5 h-5 rounded bg-blue-500 opacity-20 transition-all duration-300 border-2 border-gray-800"></div>
                <div id="hud-indigo" class="w-5 h-5 rounded bg-indigo-500 opacity-20 transition-all duration-300 border-2 border-gray-800"></div>
                <div id="hud-violet" class="w-5 h-5 rounded bg-purple-500 opacity-20 transition-all duration-300 border-2 border-gray-800"></div>
            </div>
            <!-- 新增武器顯示 -->
            <div class="mt-2 text-sm font-bold text-gray-700 bg-white/50 px-2 py-1 rounded border-2 border-gray-300 shadow-sm">
                武器: <span id="weapon-name">🔫 手槍</span> <span class="text-xs hidden md:inline">(按 Q 切換)</span>
            </div>
        </div>

        <!-- 小地圖 (雷達) 與 計時器 -->
        <div class="absolute top-4 right-4 bg-black/50 backdrop-blur-md p-2 rounded-2xl border-2 border-white/20 shadow-xl pointer-events-auto flex flex-col items-center">
            <!-- 計時器 -->
            <div id="game-timer" class="text-yellow-400 font-mono text-xl font-bold mb-1 tracking-widest drop-shadow-md">00:00</div>
            <canvas id="minimap-canvas" width="100" height="100" class="rounded-xl bg-green-900/30"></canvas>
            <p class="text-center text-white/70 text-[10px] font-bold mt-1 tracking-widest">雷達系統</p>
        </div>

        <!-- 怪獸警告訊息 -->
        <div id="warning-msg" class="absolute top-24 left-1/2 transform -translate-x-1/2 bg-red-600 text-white px-6 py-2 rounded-full font-bold text-xl md:text-2xl shadow-[0_0_20px_rgba(220,38,38,0.8)] opacity-0 transition-opacity duration-500 pointer-events-none z-40 whitespace-nowrap">
            ⚠️ 恐怖麋鹿怪獸來襲！快逃或戰鬥！
        </div>

        <!-- 虛擬搖桿 (手機專用) -->
        <div id="joystick-base">
            <div id="joystick-stick"></div>
        </div>
        <div id="mobile-hint" class="absolute bottom-4 right-4 text-white/70 font-bold text-sm hidden md:hidden">
            右側滑動轉向
        </div>

        <!-- 動作按鈕 (跳躍與射擊/揮砍) -->
        <div id="action-buttons" class="absolute bottom-8 right-8 flex gap-4 pointer-events-auto hidden md:hidden">
            <button id="btn-switch" class="w-14 h-14 bg-gray-500/80 hover:bg-gray-400 active:bg-gray-600 rounded-full border-4 border-gray-200 flex items-center justify-center shadow-lg backdrop-blur-sm select-none touch-none transform active:scale-95 transition-transform text-2xl">
                🔄
            </button>
            <button id="btn-shoot" class="w-16 h-16 bg-red-500/80 hover:bg-red-400 active:bg-red-600 rounded-full border-4 border-red-200 flex items-center justify-center shadow-lg backdrop-blur-sm select-none touch-none transform active:scale-95 transition-transform">
                <span class="text-3xl" id="weapon-icon">🔫</span>
            </button>
            <button id="btn-jump" class="w-16 h-16 bg-blue-500/80 hover:bg-blue-400 active:bg-blue-600 rounded-full border-4 border-blue-200 flex items-center justify-center shadow-lg backdrop-blur-sm select-none touch-none transform active:scale-95 transition-transform">
                <span class="text-3xl">⬆️</span>
            </button>
        </div>

    </div>

    <!-- 主選單 (暫停/開始) -->
    <div id="menu" class="absolute inset-0 flex flex-col items-center justify-center pointer-events-auto z-50 overflow-hidden" style="background: radial-gradient(circle at 80% 20%, #334155 0%, #0f172a 40%, #020617 100%);">
        
        <!-- 模擬月亮與背景光暈 -->
        <div class="absolute top-[10%] right-[20%] w-32 h-32 bg-white rounded-full opacity-20 blur-2xl pointer-events-none"></div>

        <!-- 標題區 -->
        <h1 class="text-6xl md:text-8xl font-black text-transparent bg-clip-text bg-gradient-to-b from-white to-blue-200 drop-shadow-[0_10px_10px_rgba(0,0,0,0.8)] mb-2 relative z-10" style="-webkit-text-stroke: 1px #0f172a;">
            求生密碼 <span class="text-yellow-400 text-5xl md:text-7xl absolute -top-4 -right-12 drop-shadow-[0_0_15px_rgba(250,204,21,0.8)]">💎</span>
        </h1>
        <h2 class="text-2xl md:text-3xl text-cyan-300 font-bold mb-8 tracking-widest drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)] z-10">→ 99夜驚魂森林 ←</h2>

        <!-- 特色說明區塊 -->
        <div class="bg-black/60 p-6 md:p-8 rounded-2xl shadow-2xl max-w-md w-11/12 text-center mb-8 border border-cyan-800 backdrop-blur-sm z-10">
            <h3 class="text-xl md:text-2xl font-bold text-yellow-400 mb-4 drop-shadow-md">符合12年國教素養命題趨勢</h3>
            <ul class="text-left text-green-400 font-bold space-y-3 text-lg md:text-xl drop-shadow-md">
                <li class="flex items-start"><span class="text-teal-500 mr-2">●</span>搭配課程主題編排，各版本適用</li>
                <li class="flex items-start"><span class="text-teal-500 mr-2">●</span>一日一回分量剛好，練習無負擔</li>
                <li class="flex items-start"><span class="text-teal-500 mr-2">●</span>關鍵提示了解題意，提升理解力</li>
            </ul>
            
            <!-- 操作提示 (較小字體) -->
            <div class="mt-6 pt-4 border-t border-gray-700 text-gray-400 text-sm text-left leading-relaxed">
                <span class="text-red-400 font-bold">生存指南：</span><br/>
                💻 <kbd class="bg-gray-800 px-1 rounded text-white">W</kbd><kbd class="bg-gray-800 px-1 rounded text-white">A</kbd><kbd class="bg-gray-800 px-1 rounded text-white">S</kbd><kbd class="bg-gray-800 px-1 rounded text-white">D</kbd> 移動，<kbd class="bg-gray-800 px-1 rounded text-white">空白鍵</kbd> 跳躍，<kbd class="bg-gray-800 px-1 rounded text-white">Q</kbd> 切換武器<br/>
                📱 左側搖桿移動，右側滑動視角，按鈕攻擊與跳躍。<br/>
                🎯 攻擊七彩方塊解題，小心每兩分鐘出沒的恐怖麋鹿！
            </div>
        </div>

        <button id="start-btn" class="px-10 py-4 bg-yellow-500 hover:bg-yellow-400 text-yellow-900 text-3xl font-black rounded-full shadow-[0_6px_0_#b45309] hover:shadow-[0_4px_0_#b45309] transform hover:translate-y-[2px] active:translate-y-[6px] active:shadow-none
